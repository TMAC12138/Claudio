<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e94560">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <title>Claudio - AI DJ</title>
</head>
<body>
  <div id="app">

    <!-- Player View -->
    <div id="view-player" class="view active">
      <header class="header">
        <span class="logo">♬ Claudio</span>
        <span class="weather-badge" id="weather-badge"></span>
      </header>

      <div class="player-art">
        <div class="album-cover" id="album-cover">♪</div>
      </div>

      <div class="player-info">
        <div class="song-title" id="song-title">等待播放...</div>
        <div class="song-artist" id="song-artist">你的私人 AI DJ</div>
      </div>

      <div class="progress-wrap" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-duration">0:00</span>
      </div>

      <div class="controls">
        <button id="btn-next" class="ctrl-btn" title="下一首">⏭</button>
        <button id="btn-play" class="ctrl-btn ctrl-main" title="播放/暂停">▶</button>
        <button id="btn-chat-toggle" class="ctrl-btn" title="聊天">💬</button>
      </div>

      <div class="volume-wrap">
        <span>🔊</span>
        <input type="range" id="volume" min="0" max="100" value="80">
      </div>

      <audio id="audio" preload="auto"></audio>
    </div>

    <!-- Chat View -->
    <div id="view-chat" class="view">
      <header class="header">
        <span>💬 DJ Chat</span>
      </header>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-wrap">
        <input id="chat-input" type="text" placeholder="和 DJ 聊聊..." autocomplete="off">
        <button id="chat-send" class="btn-send">发送</button>
      </div>
    </div>

    <!-- Profile View -->
    <div id="view-profile" class="view">
      <header class="header">
        <span>👤 我的品味</span>
      </header>
      <div class="profile-content">
        <h3>🎵 音乐口味</h3>
        <div class="taste-card" id="taste-content"></div>
        <button class="btn-edit" onclick="editTaste('taste.md')">编辑口味</button>

        <h3>📅 每日作息</h3>
        <div class="taste-card" id="routines-content"></div>
        <button class="btn-edit" onclick="editTaste('routines.md')">编辑作息</button>

        <h3>🎭 情绪规则</h3>
        <div class="taste-card" id="mood-content"></div>
        <button class="btn-edit" onclick="editTaste('mood-rules.md')">编辑规则</button>
      </div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view">
      <header class="header">
        <span>⚙️ 设置</span>
      </header>
      <div class="settings-content">
        <h3>📊 今日统计</h3>
        <div id="stats-content"></div>
        <h3>定时广播</h3>
        <div id="scheduler-status"></div>
        <h3>UPnP 音响</h3>
        <div id="devices-list"></div>
        <button class="btn-scan" onclick="location.reload()">刷新</button>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="player">🎵 播放</button>
      <button class="nav-btn" data-view="chat">💬 聊天</button>
      <button class="nav-btn" data-view="profile">👤 品味</button>
      <button class="nav-btn" data-view="settings">⚙️ 设置</button>
    </nav>
  </div>

  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
