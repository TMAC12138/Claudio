<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e94560">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <title>Claudio - AI DJ</title>
</head>
<body>
  <div id="app">

    <!-- Player View -->
    <div id="view-player" class="view active">
      <main class="player-shell">
        <section class="hero-copy">
          <p class="eyebrow">Personal AI DJ Radio</p>
          <h1>个人 AI DJ 电台</h1>
          <p class="hero-subtitle">小月读懂你的品味，在歌曲之间陪你聊几句。</p>
        </section>

        <section class="now-card">
          <div class="cover-frame">
            <img id="album-cover-img" class="album-cover-img" alt="专辑封面">
            <div id="album-cover" class="album-cover-fallback">♪</div>
          </div>

          <div class="track-panel">
            <div class="track-kicker" id="play-status">准备播放</div>
            <h2 class="song-title" id="song-title">等待播放...</h2>
            <div class="song-artist" id="song-artist">你的私人 AI DJ</div>
            <div class="song-album" id="song-album">Claudio 会根据此刻状态推荐下一首</div>

            <blockquote class="dj-line" id="dj-line">周一下午，阳光正好，有点那种慵懒的感觉。来点温度。</blockquote>
            <p class="reason-line" id="reason-line">选曲理由会显示在这里。</p>

            <div class="tag-row" id="reason-tags">
              <span>温暖</span>
              <span>午后</span>
              <span>平静</span>
            </div>
          </div>

          <div class="progress-zone">
            <div class="progress-wrap" id="progress-container">
              <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="time-row">
              <span id="time-current">0:00</span>
              <span id="time-duration">0:00</span>
            </div>
          </div>

          <div class="player-actions">
            <button id="btn-play" class="primary-action" title="播放/暂停">继续</button>
            <button id="btn-next" class="secondary-action" title="跳过当前">跳过当前</button>
            <button id="btn-prev" class="secondary-action" title="上一首">返回上一首</button>
          </div>

          <div class="mood-row" id="mood-row">
            <button data-prompt="来点适合专注工作的音乐">专注</button>
            <button data-prompt="来点放松一点的音乐">放松</button>
            <button data-prompt="来点适合有点伤感的时候听的歌">伤感</button>
            <button data-prompt="来点让我兴奋起来的音乐">兴奋</button>
            <button data-prompt="来点适合疲惫时恢复状态的音乐">疲惫</button>
            <button data-prompt="来点适合深夜独处的音乐">深夜独处</button>
          </div>

          <section class="lyrics-panel">
            <div class="lyrics-header">
              <span>歌词</span>
              <span id="queue-count">队列 0 首</span>
            </div>
            <div id="lyrics-content" class="lyrics-content">播放歌曲后会自动加载歌词。</div>
          </section>

          <div class="player-chatbar">
            <input id="player-chat-input" type="text" placeholder="跟小月说点什么...「来点安静的」「为什么放这首」" autocomplete="off">
            <button id="player-chat-send" class="btn-send">发送</button>
          </div>
        </section>
      </main>
      <audio id="audio" preload="auto"></audio>
    </div>

    <!-- Chat View -->
    <div id="view-chat" class="view">
      <header class="header">
        <span>💬 DJ Chat</span>
      </header>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-wrap">
        <input id="chat-input" type="text" placeholder="和 DJ 聊聊..." autocomplete="off">
        <button id="chat-send" class="btn-send">发送</button>
      </div>
    </div>

    <!-- Profile View -->
    <div id="view-profile" class="view">
      <header class="header">
        <span>👤 我的品味</span>
      </header>
      <div class="profile-content">
        <h3>🎵 音乐口味</h3>
        <div class="taste-card" id="taste-content"></div>
        <button class="btn-edit" onclick="editTaste('taste.md')">编辑口味</button>

        <h3>📅 每日作息</h3>
        <div class="taste-card" id="routines-content"></div>
        <button class="btn-edit" onclick="editTaste('routines.md')">编辑作息</button>

        <h3>🎭 情绪规则</h3>
        <div class="taste-card" id="mood-content"></div>
        <button class="btn-edit" onclick="editTaste('mood-rules.md')">编辑规则</button>
      </div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view">
      <header class="header">
        <span>⚙️ 设置</span>
      </header>
      <div class="settings-content">
        <h3>📊 今日统计</h3>
        <div id="stats-content"></div>
        <h3>定时广播</h3>
        <div id="scheduler-status"></div>
        <h3>UPnP 音响</h3>
        <div id="devices-list"></div>
        <button class="btn-scan" onclick="location.reload()">刷新</button>
        <h3>本地服务</h3>
        <div class="service-actions">
          <button id="btn-stop-ncm" class="btn-danger">关闭 NCM Enhanced</button>
          <button id="btn-stop-claudio" class="btn-danger">关闭 Claudio</button>
        </div>
        <div id="service-status" class="service-status"></div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="player">🎵 播放</button>
      <button class="nav-btn" data-view="chat">💬 聊天</button>
      <button class="nav-btn" data-view="profile">👤 品味</button>
      <button class="nav-btn" data-view="settings">⚙️ 设置</button>
    </nav>
  </div>

  <script type="module" src="/js/app.js?v=20260518-3"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
